spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:${DB_HOST_PORT:15432}/aidev
    username: aidev
    password: aidev

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update

groq:
  api-key: ${GROQ_API_KEY:}

logging:
  level:
    com.max.ai_dev_companion: DEBUG
    root: INFO