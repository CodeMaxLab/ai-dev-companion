spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:${DB_HOST_PORT:15432}/aidev
    username: aidev
    password: aidev

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update

groq:
  api-key: ${GROQ_API_KEY:}

embedding:
  base-url: ${EMBEDDING_BASE_URL:http://localhost:11434}
  model: ${EMBEDDING_MODEL:all-minilm}
  max-input-chars: ${EMBEDDING_MAX_INPUT_CHARS:1000}

chunking:
  max-chars: ${CHUNKING_MAX_CHARS:1000}
  overlap: ${CHUNKING_OVERLAP:200}

logging:
  level:
    com.max.ai_dev_companion: DEBUG
    root: INFO